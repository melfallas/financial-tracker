<ft-navbar></ft-navbar>

<main>
    <ft-hero></ft-hero>
    <ft-wealth-gap-chart></ft-wealth-gap-chart>
    <ft-cost-of-waiting></ft-cost-of-waiting>
    <ft-retirement-simulator (onPlanRequested)="handlePlanRequested($event)"></ft-retirement-simulator>

    <!-- Email Dispatch Feedback UI -->
    <div class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 max-w-sm transition-all duration-300">
        @if (emailStatus() === 'sending') {
            <div class="bg-blue-600 text-white p-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-pulse">
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <div class="flex flex-col">
                    <span class="font-bold">Enviando tu Plan...</span>
                    <span class="text-xs opacity-80">Por favor espera un momento</span>
                </div>
            </div>
        } @else if (emailStatus() === 'sent') {
            <div class="bg-emerald-500 text-white p-4 rounded-2xl shadow-2xl flex items-center gap-3 fade-in">
                <div class="bg-white/20 p-2 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <div class="flex flex-col">
                    <span class="font-bold">¡Plan enviado!</span>
                    <span class="text-xs opacity-80">Revisa tu bandeja de entrada</span>
                </div>
            </div>
        } @else if (emailStatus() === 'failed') {
            <div class="bg-red-50 border border-red-200 text-red-700 p-5 rounded-2xl shadow-2xl flex flex-col gap-3 fade-in">
                <div class="flex items-center gap-3">
                    <div class="bg-red-100 p-2 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                    </div>
                    <div class="flex flex-col">
                        <span class="font-bold">Problema con el envío</span>
                        <span class="text-xs opacity-80">No pudimos enviar el correo.</span>
                    </div>
                </div>
                <div class="flex gap-2 mt-1">
                    <button (click)="downloadManualPdf()" class="flex-1 bg-red-600 hover:bg-red-700 text-white text-xs font-bold py-2 px-3 rounded-lg transition-colors flex items-center justify-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                        Descargar
                    </button>
                    <button (click)="retryEmail()" class="flex-1 bg-white hover:bg-red-50 border border-red-200 text-red-600 text-xs font-bold py-2 px-3 rounded-lg transition-colors flex items-center justify-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                        Reintentar
                    </button>
                </div>
            </div>
        }
    </div>
</main>
