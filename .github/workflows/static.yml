# Simple workflow for deploying Angular web app to GitHub Pages
name: Deploy Angular App to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - main
      - develop
      # - feature/
      # - feature/MVP-01_Final_Details_Definiton_for_MVP

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  # contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install System Dependencies for Graphical Server and Draw Libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          # package-manager: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Create .env file
        run: |
          echo "NG_APP_EMAIL_SENDING_FUNCTION_URL=${{ secrets.NG_APP_EMAIL_SENDING_FUNCTION_URL }}" >> .env
          echo "NG_APP_EMAIL_SENDING_FUNCTION_KEY=${{ secrets.NG_APP_EMAIL_SENDING_FUNCTION_KEY }}" >> .env
          echo "NG_APP_EMAIL_SENDING_KEY=${{ secrets.NG_APP_EMAIL_SENDING_KEY }}" >> .env
          echo "NG_APP_EMAIL_SENDING_DOMAIN=${{ secrets.NG_APP_EMAIL_SENDING_DOMAIN }}" >> .env
          echo "NG_APP_CALENDLY_BASE_URL=${{ secrets.NG_APP_CALENDLY_BASE_URL }}" >> .env
          echo "NG_APP_STAGE=${{ secrets.NG_APP_STAGE }}" >> .env

      - name: Build Angular App for Production
        # run: pnpm run build:prod
        run: pnpm ng build --configuration production --base-href /financial-tracker/ --deploy-url /financial-tracker/

      # Route file renaming for index.html to 404.html for GitHub Pages routing
      - name: Rename index for routing
        run: mv dist/financial-tracker/browser/index.html dist/financial-tracker/browser/404.html

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/financial-tracker/browser
          publish_branch: gh-pages
          # clean: true

      # # Deploy to Github pages
