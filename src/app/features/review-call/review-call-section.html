<section id="agenda-llamada" aria-labelledby="review-call-header" class="review-call-container">
  <div class="review-call-content">
    <div class="header-group">
      <!-- Calendar icon for visual hook -->
      <div class="icon-wrapper" aria-hidden="true">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="calendar-icon"
        >
          <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
          <line x1="16" x2="16" y1="2" y2="6" />
          <line x1="8" x2="8" y1="2" y2="6" />
          <line x1="3" x2="21" y1="10" y2="10" />
          <path d="M8 14h.01" />
          <path d="M12 14h.01" />
          <path d="M16 14h.01" />
          <path d="M8 18h.01" />
          <path d="M12 18h.01" />
          <path d="M16 18h.01" />
        </svg>
      </div>

      <h2 id="review-call-header" class="review-call-title">¡Has dado el primer paso!</h2>
    </div>

    <p class="review-call-body">
      Ahora necesitas definir tu línea de tiempo y revisar tu plan financiero junto a nuestro
      equipo. No tienes que resolverlo solo. Agenda una llamada gratuita y te ayudamos a trazar el
      plan de acción que tu situación requiere.
    </p>

    <div class="action-wrapper">
      <button
        type="button"
        class="review-call-cta"
        (click)="openBooking()"
        aria-label="Agendar una llamada gratuita para revisar tu plan financiero"
      >
        Revisa tu Plan con Nosotros
      </button>
    </div>
  </div>
</section>
