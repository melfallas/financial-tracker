<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Inversión a Plazo</title>
    <style>
        /* Estilos Generales */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5; /* Un fondo suave y moderno */
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 20px;
            padding-bottom: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 90%;
            max-width: 1000px; /* Ancho máximo para PC, se ajustará en móviles */
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h1, h2 {
            color: #005A9C; /* Azul corporativo */
            text-align: center;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2em; /* Ajuste para diferentes pantallas */
        }

        h2 {
            font-size: 1.5em;
            border-bottom: 2px solid #007BFF; /* Línea sutil bajo el subtítulo */
            padding-bottom: 10px;
            margin-top: 30px;
        }

        /* Sección de Moneda */
        .currency-selector {
            display: flex;
            justify-content: center;
            gap: 15px; /* Espacio entre botones */
            margin-bottom: 25px;
        }

        .currency-button {
            padding: 12px 25px;
            font-size: 1em;
            border: 2px solid transparent; /* Borde transparente por defecto */
            border-radius: 8px;
            cursor: pointer;
            background-color: #e9ecef; /* Gris claro para botones no activos */
            color: #495057;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .currency-button.active {
            background-color: #007BFF; /* Azul primario para botón activo */
            color: white;
            border-color: #0056b3; /* Borde más oscuro para el activo */
            box-shadow: 0 4px 8px rgba(0, 123, 255, 0.3);
        }
        
        .currency-button:hover:not(.active) {
            background-color: #ced4da; /* Gris más oscuro al pasar el mouse */
        }

        /* Sección de Monto a Invertir */
        .investment-amount {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            padding: 15px;
            background-color: #f8f9fa; /* Fondo ligeramente diferente para esta sección */
            border-radius: 8px;
        }

        .investment-amount label {
            font-size: 1.1em;
            font-weight: bold;
            color: #005A9C;
        }

        .investment-amount input[type="number"] {
            padding: 10px;
            font-size: 1.1em;
            border: 1px solid #ced4da;
            border-radius: 6px;
            width: 150px; /* Ancho fijo, se puede ajustar con media queries */
            text-align: right;
            transition: border-color 0.3s ease;
        }
        
        .investment-amount input[type="number"]:focus {
            border-color: #007BFF;
            outline: none;
            box-shadow: 0 0 0 0.2rem rgba(0,123,255,.25);
        }

        .investment-amount .currency-label-input {
            font-size: 1.1em;
            font-weight: bold;
            color: #005A9C;
            margin-left: -5px; /* Ajuste para que esté más cerca del input */
        }

        /* Sección de Información de Depósito */
        .deposit-info {
            text-align: center;
            margin-bottom: 25px;
        }

        .deposit-info h2 {
            font-size: 1.4em; /* Ligeramente más pequeño que el H1 */
            margin-bottom: 8px;
        }

        .offer-validity {
            font-size: 0.95em;
            color: #E85D04; /* Naranja para la validez, como en el diseño original */
            font-weight: bold;
        }

        /* Tablas de Rendimiento */
        .tables-container {
            display: flex;
            flex-wrap: wrap; /* Para que las tablas se acomoden en pantallas pequeñas */
            gap: 20px; /* Espacio entre tablas */
            justify-content: space-between;
        }

        .table-wrapper {
            flex: 1; /* Permite que las tablas compartan el espacio */
            min-width: 300px; /* Ancho mínimo para cada tabla antes de envolver */
            overflow-x: auto; /* Scroll horizontal si es necesario en pantallas muy pequeñas */
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            border-radius: 8px;
            overflow: hidden; /* Para que el border-radius afecte a las celdas */
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #dee2e6; /* Líneas de separación más sutiles */
        }

        th {
            background-color: #007BFF; /* Azul primario para encabezados */
            color: white;
            font-weight: bold;
            text-align: center;
        }

        td {
            background-color: #fff;
        }
        
        tr:last-child td {
            border-bottom: none; /* Sin borde en la última fila */
        }

        tr:nth-child(even) td {
            background-color: #f8f9fa; /* Rayado sutil para mejor legibilidad */
        }
        
        td.highlight-yield {
            font-weight: bold;
            color: #28a745; /* Verde para rendimientos */
        }
        
        td.highlight-total {
            font-weight: bold;
            color: #17a2b8; /* Cian para totales */
        }

        /* Estilos para Responsividad */
        @media (max-width: 768px) { /* Tablets y móviles grandes */
            .container {
                width: 95%;
                padding: 15px;
            }
            h1 { font-size: 1.8em; }
            h2 { font-size: 1.3em; }
            .currency-button { padding: 10px 20px; font-size: 0.95em; }
            .investment-amount { flex-direction: column; gap: 10px; }
            .investment-amount input[type="number"] { width: 100%; }
            .tables-container { flex-direction: column; }
            .table-wrapper { min-width: 100%; } /* Tablas ocupan todo el ancho */
            th, td { padding: 10px; font-size: 0.9em; }
        }

        @media (max-width: 480px) { /* Móviles pequeños */
            h1 { font-size: 1.5em; }
            h2 { font-size: 1.2em; }
            .currency-selector { flex-direction: column; gap: 10px; }
            .currency-button { width: 100%; }
            .investment-amount label { font-size: 1em; }
            .investment-amount input[type="number"] { font-size: 1em; }
            th, td { padding: 8px; font-size: 0.85em; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Calculadora de Inversión a Plazo</h1>

        <div class="currency-selector">
            <button id="btnColones" class="currency-button active">Colones (CRC)</button>
            <button id="btnDolares" class="currency-button">Dólares (USD)</button>
        </div>

        <div class="investment-amount">
            <label for="amount">Monto a Invertir:</label>
            <input type="number" id="amount" value="100000">
            <span id="currencyLabelInput" class="currency-label-input">CRC</span>
        </div>

        <div class="deposit-info">
            <h2 id="depositTitle">Depósitos a Plazo Colones (CRC)</h2>
            <p id="offerValidity" class="offer-validity">Válido hasta el YYYY-MM-DD</p>
        </div>

        <div class="tables-container">
            <div class="table-wrapper">
                <h2>Tasa de Rendimiento por Tiempo</h2>
                <table id="yieldTable">
                    <thead>
                        <tr>
                            <th>Plazo</th>
                            <th>Rendimiento</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>

            <div class="table-wrapper">
                <h2>Ejemplo de Aporte por Tiempo</h2>
                <table id="projectionTable">
                    <thead>
                        <tr>
                            <th>Importe</th>
                            <th>Plazo</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Variables de configuración
        const offerExpirationDate = '2025-12-31'; // Fecha de expiración de la oferta
        const ratesCRC = [5, 5.5, 6, 7, 8]; // Tasas para Colones
        const ratesUSD = [2.0, 2.2, 2.5, 2.8, 3.0]; // Tasas para Dólares (ejemplo)
        const terms = [1, 2, 3, 4, 5]; // Plazos en años

        let currentCurrency = 'CRC'; // Moneda actual
        let currentAmount = 100000; // Monto actual

        // Elementos del DOM
        const btnColones = document.getElementById('btnColones');
        const btnDolares = document.getElementById('btnDolares');
        const amountInput = document.getElementById('amount');
        const currencyLabelInput = document.getElementById('currencyLabelInput');
        const depositTitle = document.getElementById('depositTitle');
        const offerValidityElement = document.getElementById('offerValidity');
        const yieldTableBody = document.getElementById('yieldTable').getElementsByTagName('tbody')[0];
        const projectionTableBody = document.getElementById('projectionTable').getElementsByTagName('tbody')[0];

        // --- Funciones ---

        /**
         * Formatea una fecha a YYYY-MM-DD.
         * @param {string} dateString - La fecha en formato que pueda ser parseado por Date.
         * @returns {string} La fecha formateada.
         */
        function formatDate(dateString) {
            const date = new Date(dateString);
            // Ajustar por la zona horaria para evitar problemas de un día menos
            date.setMinutes(date.getMinutes() + date.getTimezoneOffset());
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        /**
         * Formatea un número a un string con separadores de miles y dos decimales.
         * @param {number} number - El número a formatear.
         * @param {number} decimals - Cantidad de decimales.
         * @returns {string} El número formateado.
         */
        function formatNumber(number, decimals = 2) {
            return number.toLocaleString(undefined, { 
                minimumFractionDigits: decimals, 
                maximumFractionDigits: decimals 
            });
        }


        /**
         * Actualiza la interfaz de usuario según la moneda seleccionada.
         */
        function updateUI() {
            // Actualizar botones de moneda
            if (currentCurrency === 'CRC') {
                btnColones.classList.add('active');
                btnDolares.classList.remove('active');
                amountInput.value = 100000; // Valor por defecto para CRC
                currentAmount = 100000;
            } else {
                btnDolares.classList.add('active');
                btnColones.classList.remove('active');
                amountInput.value = 1000; // Valor por defecto para USD
                currentAmount = 1000;
            }
            currencyLabelInput.textContent = currentCurrency;
            depositTitle.textContent = `Depósitos a Plazo ${currentCurrency === 'CRC' ? 'Colones' : 'Dólares'} (${currentCurrency})`;
            
            // Actualizar tablas
            populateTables();
        }
        
        /**
         * Actualiza las tablas de rendimiento y proyección.
         */
        function populateTables() {
            const rates = currentCurrency === 'CRC' ? ratesCRC : ratesUSD;
            
            // Limpiar tablas existentes
            yieldTableBody.innerHTML = '';
            projectionTableBody.innerHTML = '';

            terms.forEach((term, index) => {
                const rate = rates[index];
                if (rate === undefined) {
                    console.error(`No se encontró tasa para el plazo ${term} en ${currentCurrency}`);
                    return; 
                }

                // Fila para la tabla de rendimiento
                const yieldRow = yieldTableBody.insertRow();
                yieldRow.insertCell().textContent = `${term} año${term > 1 ? 's' : ''}`;
                const yieldCell = yieldRow.insertCell();
                yieldCell.textContent = `${formatNumber(rate, 2)} %`;
                yieldCell.classList.add('highlight-yield');


                // Calcular valor futuro (interés compuesto)
                // FV = P * (1 + r)^n
                // P = currentAmount
                // r = rate / 100
                // n = term
                const principal = parseFloat(amountInput.value) || 0; // Usar el valor actual del input
                const annualRate = rate / 100;
                const futureValue = principal * Math.pow((1 + annualRate), term);

                // Fila para la tabla de proyección
                const projectionRow = projectionTableBody.insertRow();
                projectionRow.insertCell().textContent = formatNumber(principal, 2);
                projectionRow.insertCell().textContent = `${term} año${term > 1 ? 's' : ''}`;
                const totalCell = projectionRow.insertCell();
                totalCell.textContent = formatNumber(futureValue, 2);
                totalCell.classList.add('highlight-total');
            });
        }


        // --- Event Listeners ---
        btnColones.addEventListener('click', () => {
            if (currentCurrency !== 'CRC') {
                currentCurrency = 'CRC';
                updateUI();
            }
        });

        btnDolares.addEventListener('click', () => {
            if (currentCurrency !== 'USD') {
                currentCurrency = 'USD';
                updateUI();
            }
        });

        amountInput.addEventListener('input', () => {
            currentAmount = parseFloat(amountInput.value) || 0;
            // Solo repopular la tabla de proyección, ya que las tasas no cambian
            populateTables(); 
        });
        
        amountInput.addEventListener('change', () => { // Para asegurar que si el usuario borra y sale, se use 0
             if (amountInput.value === '' || isNaN(parseFloat(amountInput.value))) {
                amountInput.value = 0;
             }
             currentAmount = parseFloat(amountInput.value) || 0;
             populateTables();
        });


        // --- Inicialización ---
        function initializeApp() {
            offerValidityElement.textContent = `Válido hasta el ${formatDate(offerExpirationDate)}`;
            updateUI(); // Configura la UI inicial (Colones por defecto)
        }

        // Iniciar la aplicación cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', initializeApp);

    </script>
</body>
</html>
