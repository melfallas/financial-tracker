<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Financial Tracker</title>
    <script type="text/javascript">
      // SPA routing for GitHub Pages — preserves /financial-tracker sub-path
      // slice(0, 2) = ["" , "financial-tracker"] → "/financial-tracker"
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        // l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
        l.pathname.split('/').slice(0, 2).join('/') + '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
